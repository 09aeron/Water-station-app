<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Cashier Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d1117;--surface:#161b22;--surface2:#1f2937;--border:#30363d;
  --accent:#00d4aa;--accent2:#0ea5e9;--danger:#f87171;--warn:#fbbf24;
  --text:#e6edf3;--muted:#7d8590;--paid:#34d399;--unpaid:#f87171;--commission:#a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;padding:16px;}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.header-title{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--accent);letter-spacing:-0.5px;}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.date-display{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center;}
.date-day{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--accent);line-height:1;}
.date-rest{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

/* SYNC STATUS */
.sync-status{display:flex;align-items:center;gap:6px;font-size:0.68rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background 0.3s;}
.sync-dot.synced{background:var(--paid);box-shadow:0 0 6px rgba(52,211,153,0.5);}
.sync-dot.syncing{background:var(--warn);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* TABS */
.tabs-wrap{display:flex;align-items:center;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.tab-btn{padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'DM Mono',monospace;font-size:0.82rem;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.tab-btn:hover{border-color:var(--accent);color:var(--accent);}
.tab-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
.tab-btn.delivery-tab.active{background:var(--accent2);border-color:var(--accent2);}
.tab-btn.dashboard-tab{border-color:var(--warn);color:var(--warn);}
.tab-btn.dashboard-tab.active{background:var(--warn);color:#000;border-color:var(--warn);font-weight:600;}
.tab-btn.records-tab{border-color:var(--commission);color:var(--commission);}
.tab-btn.records-tab.active{background:var(--commission);color:#000;border-color:var(--commission);font-weight:600;}
.tab-del-btn{background:none;border:none;color:#000;font-size:0.8rem;cursor:pointer;padding:0 0 0 5px;opacity:0.6;line-height:1;}
.tab-del-btn:hover{opacity:1;}
.btn-add-section{padding:9px 14px;border-radius:8px;border:1px dashed var(--accent);background:transparent;color:var(--accent);font-family:'DM Mono',monospace;font-size:0.8rem;cursor:pointer;transition:all 0.15s;}
.btn-add-section:hover{background:rgba(0,212,170,0.08);}

/* FORM */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px;}
.field{display:flex;flex-direction:column;gap:5px;}
label{font-size:0.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
input,select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.9rem;padding:9px 11px;outline:none;transition:border-color 0.2s;width:100%;}
input:focus,select:focus{border-color:var(--accent);}
select option{background:var(--surface2);}
.price-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:0.72rem;cursor:pointer;transition:all 0.15s;color:var(--text);}
.chip:hover,.chip.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
.payment-toggle{display:flex;gap:8px;}
.pay-btn{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Mono',monospace;font-size:0.82rem;cursor:pointer;transition:all 0.15s;}
.pay-btn.paid-active{background:var(--paid);color:#000;border-color:var(--paid);font-weight:600;}
.pay-btn.unpaid-active{background:var(--unpaid);color:#000;border-color:var(--unpaid);font-weight:600;}
.total-preview{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.total-label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.total-value{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--accent);}
.btn-add{width:100%;padding:13px;background:var(--accent);color:#000;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:opacity 0.15s,transform 0.1s;letter-spacing:0.5px;}
.btn-add:hover{opacity:0.9;}
.btn-add:active{transform:scale(0.98);}

/* TABLE */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:18px;}
.table-header-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.section-title{font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;color:var(--text);}
.btn-export{padding:7px 12px;background:var(--surface2);border:1px solid var(--accent2);color:var(--accent2);border-radius:8px;font-family:'DM Mono',monospace;font-size:0.72rem;cursor:pointer;transition:all 0.15s;}
.btn-export:hover{background:var(--accent2);color:#000;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.8rem;}
thead th{background:var(--surface2);padding:9px 11px;text-align:left;font-size:0.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
tbody tr:hover{background:var(--surface2);}
tbody tr:last-child{border-bottom:none;}
td{padding:9px 11px;vertical-align:middle;white-space:nowrap;}
.badge-paid{background:rgba(52,211,153,0.15);color:var(--paid);border:1px solid rgba(52,211,153,0.3);padding:3px 7px;border-radius:5px;font-size:0.67rem;font-weight:600;}
.badge-unpaid{background:rgba(248,113,113,0.15);color:var(--unpaid);border:1px solid rgba(248,113,113,0.3);padding:3px 7px;border-radius:5px;font-size:0.67rem;font-weight:600;}
.action-btns{display:flex;gap:5px;}
.btn-edit,.btn-del{padding:5px 9px;border-radius:6px;border:none;font-family:'DM Mono',monospace;font-size:0.7rem;cursor:pointer;transition:all 0.15s;}
.btn-edit{background:rgba(14,165,233,0.15);color:var(--accent2);border:1px solid rgba(14,165,233,0.3);}
.btn-edit:hover{background:var(--accent2);color:#000;}
.btn-del{background:rgba(248,113,113,0.15);color:var(--danger);border:1px solid rgba(248,113,113,0.3);}
.btn-del:hover{background:var(--danger);color:#000;}
.empty-row td{text-align:center;color:var(--muted);padding:24px;font-size:0.82rem;}

/* SUMMARY */
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px;}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:9px;margin-top:12px;}
.sum-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px;}
.sum-cat{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px;}
.sum-qty{font-size:0.72rem;color:var(--muted);margin-bottom:2px;}
.sum-total{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--accent);}
.sum-commission{font-size:0.7rem;color:var(--commission);margin-top:2px;}
.grand-total-box{background:linear-gradient(135deg,rgba(0,212,170,0.1),rgba(14,165,233,0.1));border:1px solid var(--accent);border-radius:12px;padding:16px;margin-top:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.grand-label{font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;color:var(--text);}
.grand-value{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--accent);}
.overall-box{background:linear-gradient(135deg,rgba(14,165,233,0.12),rgba(167,139,250,0.08));border:1px solid var(--accent2);border-radius:12px;padding:16px;margin-top:12px;}
.overall-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-top:10px;}
.overall-item{text-align:center;}
.o-label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;}
.o-val{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;}

/* DASHBOARD */
.dash-hero{background:linear-gradient(135deg,rgba(0,212,170,0.08),rgba(14,165,233,0.08));border:1px solid rgba(0,212,170,0.25);border-radius:16px;padding:20px;margin-bottom:20px;}
.dash-hero-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--accent);margin-bottom:4px;}
.dash-hero-sub{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.dash-kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:16px;}
.dash-kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.dash-kpi-label{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.dash-kpi-val{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;}
.dash-kpi-val.green{color:var(--accent);}
.dash-kpi-val.blue{color:var(--accent2);}
.dash-kpi-val.purple{color:var(--commission);}
.dash-kpi-val.white{color:var(--text);}
.dash-sections-title{font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;color:var(--text);margin-bottom:12px;}
.dash-section-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.dash-sec-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color 0.2s;}
.dash-sec-card:hover{border-color:var(--accent);}
.dash-sec-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface2);}
.dash-sec-name.pickup-color{color:var(--accent);}
.dash-sec-name.delivery-color{color:var(--accent2);}
.dash-sec-entries{font-size:0.65rem;color:var(--muted);}
.dash-sec-body{display:grid;grid-template-columns:repeat(4,1fr);padding:14px 16px;gap:10px;}
.dash-metric{text-align:center;}
.dash-metric-label{font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;}
.dash-metric-val{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;}
.dash-metric-val.m-gal{color:var(--text);}
.dash-metric-val.m-sales{color:var(--accent);}
.dash-metric-val.m-comm{color:var(--commission);}
.dash-metric-val.m-overall{color:var(--accent2);}
.dash-zero{color:var(--muted)!important;opacity:0.5;}
.dash-grand{background:linear-gradient(135deg,rgba(0,212,170,0.12),rgba(14,165,233,0.1),rgba(167,139,250,0.08));border:2px solid var(--accent);border-radius:16px;padding:20px;margin-top:4px;}
.dash-grand-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--warn);margin-bottom:14px;}
.dash-grand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.dash-grand-item{background:rgba(0,0,0,0.25);border-radius:10px;padding:12px;text-align:center;}
.dg-label{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.dg-val{font-family:'Syne',sans-serif;font-weight:800;}
.dg-val.large{font-size:1.8rem;color:var(--accent);}
.dg-val.medium{font-size:1.3rem;}
.dash-export-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.btn-dash-export{padding:9px 16px;background:var(--surface2);border:1px solid var(--warn);color:var(--warn);border-radius:8px;font-family:'DM Mono',monospace;font-size:0.75rem;cursor:pointer;transition:all 0.15s;}
.btn-dash-export:hover{background:var(--warn);color:#000;}
.dash-updated{font-size:0.6rem;color:var(--muted);margin-top:8px;opacity:0.6;}

/* RECORDS VIEW */
.records-view{}
.records-header-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;}
.records-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--commission);margin-bottom:4px;}
.records-sub{font-size:0.68rem;color:var(--muted);}
.records-list{display:flex;flex-direction:column;gap:8px;}
.record-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all 0.15s;}
.record-item:hover{border-color:var(--commission);background:var(--surface2);}
.record-date-label{font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;color:var(--text);}
.record-date-sub{font-size:0.65rem;color:var(--muted);margin-top:2px;}
.record-meta{text-align:right;}
.record-total{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--accent);}
.record-sections{font-size:0.62rem;color:var(--muted);margin-top:2px;}
.record-arrow{color:var(--commission);font-size:1.1rem;margin-left:10px;}
.records-empty{text-align:center;padding:48px 20px;color:var(--muted);}
.records-empty-icon{font-size:2.5rem;margin-bottom:10px;}
.records-loading{text-align:center;padding:40px;color:var(--muted);font-size:0.85rem;}

/* PAST DATE VIEW */
.past-date-banner{background:linear-gradient(135deg,rgba(167,139,250,0.12),rgba(14,165,233,0.08));border:1px solid var(--commission);border-radius:14px;padding:14px 18px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.past-date-info{}
.past-date-label{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--commission);}
.past-date-sub{font-size:0.65rem;color:var(--muted);margin-top:2px;}
.btn-back-records{padding:8px 14px;background:var(--surface2);border:1px solid var(--commission);color:var(--commission);border-radius:8px;font-family:'DM Mono',monospace;font-size:0.75rem;cursor:pointer;transition:all 0.15s;}
.btn-back-records:hover{background:var(--commission);color:#000;}
.readonly-badge{display:inline-block;background:rgba(167,139,250,0.15);color:var(--commission);border:1px solid rgba(167,139,250,0.3);padding:3px 8px;border-radius:5px;font-size:0.62rem;font-weight:600;margin-left:8px;vertical-align:middle;}

/* MISC */
.btn-clear-day{padding:7px 12px;background:rgba(248,113,113,0.1);border:1px solid var(--danger);color:var(--danger);border-radius:8px;font-family:'DM Mono',monospace;font-size:0.72rem;cursor:pointer;transition:all 0.15s;}
.btn-clear-day:hover{background:var(--danger);color:#000;}
.type-badge{display:inline-block;font-size:0.58rem;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle;font-weight:600;text-transform:uppercase;}
.type-badge.pickup{background:rgba(0,212,170,0.15);color:var(--accent);border:1px solid rgba(0,212,170,0.3);}
.type-badge.delivery{background:rgba(14,165,233,0.15);color:var(--accent2);border:1px solid rgba(14,165,233,0.3);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:100;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;margin-bottom:16px;color:var(--accent);}
.modal-grid{display:flex;flex-direction:column;gap:11px;margin-bottom:14px;}
.modal-actions{display:flex;gap:8px;}
.btn-save{flex:1;padding:12px;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;}
.btn-cancel{flex:1;padding:12px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;font-family:'DM Mono',monospace;font-size:0.88rem;cursor:pointer;}

@media(max-width:500px){
  .form-grid{grid-template-columns:1fr 1fr;}
  .date-day{font-size:1.4rem;}
  .header-title{font-size:1.3rem;}
  .grand-value{font-size:1.5rem;}
  .dash-sec-body{grid-template-columns:repeat(2,1fr);}
  .dash-kpi-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">CASHIER LOG</div>
  <div class="header-right">
    <div class="sync-status" id="syncStatus">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">Connecting...</span>
    </div>
    <button class="btn-clear-day" id="clearBtn" onclick="clearSection()">🗑 Clear</button>
    <div class="date-display">
      <div class="date-day" id="dateDay"></div>
      <div class="date-rest" id="dateRest"></div>
    </div>
  </div>
</div>

<div class="tabs-wrap" id="tabsWrap"></div>
<div id="sectionContent"></div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">Edit Entry</div>
    <div class="modal-grid">
      <div class="field"><label>Customer Name</label><input type="text" id="eName"></div>
      <div class="field"><label>Category</label><select id="eCat" onchange="onEditCatChange()"></select></div>
      <div class="field"><label>Quantity</label><input type="number" id="eQty" min="1" oninput="calcEditTotal()"></div>
      <div class="field">
        <label>Price per unit</label>
        <div id="eChips" class="price-chips"></div>
        <input type="number" id="ePrice" min="0" style="margin-top:8px;" oninput="calcEditTotal()">
      </div>
      <div class="field"><label>Payment Status</label>
        <select id="ePayment"><option value="Paid">Paid</option><option value="No Payment">No Payment</option></select>
      </div>
      <div class="total-preview" style="margin-bottom:0;">
        <span class="total-label">Total</span>
        <span class="total-value" id="editTotalPreview">₱ 0.00</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- ADD SECTION MODAL -->
<div class="modal-overlay" id="addSectionModal">
  <div class="modal">
    <div class="modal-title">New Section</div>
    <div class="modal-grid">
      <div class="field"><label>Section Name</label><input type="text" id="newSecName" placeholder="e.g. Marvin, Delivery 1..."></div>
      <div class="field"><label>Section Type</label>
        <select id="newSecType">
          <option value="delivery">Delivery (with commission)</option>
          <option value="pickup">Pick Up (standard pricing)</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('addSectionModal').classList.remove('open')">Cancel</button>
      <button class="btn-save" onclick="confirmAddSection()">Create Section</button>
    </div>
  </div>
</div>

<!-- Firebase CDN -->

// ── STATE ─────────────────────────────────────────────────────────────────────
const DASHBOARD_ID = '__dashboard__';
const RECORDS_ID   = '__records__';

// Today's date key e.g. "2025-04-15"
function todayKey() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

let TODAY = todayKey();
let sections = [];
let activeSec = '';
let formPay   = {};
let editId    = null;
let editSecId = null;
let viewingPastDate = null; // date string when viewing past record
let pastDateData    = null; // sections array of past record

// ── SYNC STATUS ───────────────────────────────────────────────────────────────
function setSyncStatus(state, text) {
  const dot  = document.getElementById('syncDot');
  const txt  = document.getElementById('syncText');
  dot.className = 'sync-dot ' + state;
  txt.textContent = text;
}

// ── FIRESTORE HELPERS ─────────────────────────────────────────────────────────
async function loadFromFirestore(dateKey) {
  setSyncStatus('syncing', 'Loading...');
  try {
    const ref  = doc(db, 'daily_logs', dateKey);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      const data = snap.data();
      setSyncStatus('synced', 'Synced');
      return data.sections || [];
    } else {
      setSyncStatus('synced', 'Synced');
      return null;
    }
  } catch(e) {
    console.error(e);
    setSyncStatus('error', 'Offline');
    return null;
  }
}

async function saveToFirestore() {
  setSyncStatus('syncing', 'Saving...');
  try {
    const ref = doc(db, 'daily_logs', TODAY);
    await setDoc(ref, { sections, updatedAt: new Date().toISOString(), dateKey: TODAY });
    setSyncStatus('synced', 'Saved ✓');
    // briefly show then revert
    setTimeout(() => setSyncStatus('synced', 'Synced'), 2000);
  } catch(e) {
    console.error(e);
    setSyncStatus('error', 'Save failed');
  }
}

async function loadPastDates() {
  try {
    const col  = collection(db, 'daily_logs');
    const q    = query(col, orderBy('dateKey', 'desc'));
    const snap = await getDocs(q);
    const dates = [];
    snap.forEach(d => {
      const data = d.data();
      if (data.dateKey && data.dateKey !== TODAY) {
        dates.push({ dateKey: data.dateKey, sections: data.sections || [], updatedAt: data.updatedAt });
      }
    });
    return dates;
  } catch(e) {
    console.error(e);
    return [];
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  // Date display
  const n = new Date();
  document.getElementById('dateDay').textContent = n.getDate();
  document.getElementById('dateRest').textContent =
    n.toLocaleDateString('en-US',{weekday:'short',month:'short',year:'numeric'}).toUpperCase();

  // Try load today from Firestore
  const remote = await loadFromFirestore(TODAY);
  const isValid = arr => Array.isArray(arr) && arr.length > 0 &&
    arr.every(s => s && typeof s === 'object' && typeof s.id === 'string' && Array.isArray(s.entries));
  if (isValid(remote)) {
    sections = remote;
  } else {
    // fallback: localStorage or default
    const local = localStorage.getItem('cashier_sections_v3');
    if (local) {
      try { sections = JSON.parse(local); } catch(e) {}
    }
    if (!sections || sections.length === 0) {
      sections = [{id:'pickup', name:'Pick Up', type:'pickup', entries:[]}];
    }
  }

  activeSec = sections[0].id;
  renderTabs();
  renderSection();
}

function save() {
  localStorage.setItem('cashier_sections_v3', JSON.stringify(sections));
  saveToFirestore();
}

function getSec(id)  { return sections.find(s=>s.id===(id||activeSec)); }
function getActive() { return getSec(activeSec); }

// ── TABS ──────────────────────────────────────────────────────────────────────
function renderTabs() {
  const wrap = document.getElementById('tabsWrap');
  wrap.innerHTML = '';

  // Dashboard
  const dashBtn = document.createElement('button');
  dashBtn.className = 'tab-btn dashboard-tab' + (activeSec===DASHBOARD_ID?' active':'');
  dashBtn.textContent = '📊 Summary';
  dashBtn.onclick = () => switchSection(DASHBOARD_ID);
  wrap.appendChild(dashBtn);

  // Records
  const recBtn = document.createElement('button');
  recBtn.className = 'tab-btn records-tab' + (activeSec===RECORDS_ID?' active':'');
  recBtn.textContent = '📅 Records';
  recBtn.onclick = () => switchSection(RECORDS_ID);
  wrap.appendChild(recBtn);

  // Sections
  sections.forEach(sec => {
    const btn = document.createElement('button');
    const isActive = sec.id === activeSec;
    btn.className = 'tab-btn'+(isActive?' active':'')+(sec.type==='delivery'?' delivery-tab':'');
    if (sec.id === 'pickup') {
      btn.textContent = sec.name;
    } else {
      btn.innerHTML = `${esc(sec.name)}<span class="tab-del-btn" data-sid="${sec.id}">✕</span>`;
    }
    btn.addEventListener('click', function(e) {
      if (e.target.dataset.sid) { deleteSection(e.target.dataset.sid); return; }
      switchSection(sec.id);
    });
    wrap.appendChild(btn);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add-section';
  addBtn.textContent = '+ Add';
  addBtn.onclick = () => document.getElementById('addSectionModal').classList.add('open');
  wrap.appendChild(addBtn);

  // Show/hide clear button
  const cb = document.getElementById('clearBtn');
  if (cb) cb.style.display = (activeSec===DASHBOARD_ID||activeSec===RECORDS_ID) ? 'none' : '';
}

function switchSection(id) {
  viewingPastDate = null;
  pastDateData    = null;
  activeSec = id;
  renderTabs();
  if      (id === DASHBOARD_ID) renderDashboard();
  else if (id === RECORDS_ID)   renderRecords();
  else                          renderSection();
}

function deleteSection(id) {
  if (!confirm('Delete this section and all its entries?')) return;
  sections = sections.filter(s=>s.id!==id);
  if (activeSec===id) activeSec = sections[0].id;
  save();
  renderTabs();
  renderSection();
}

function confirmAddSection() {
  const name = document.getElementById('newSecName').value.trim();
  const type = document.getElementById('newSecType').value;
  if (!name) { alert('Please enter a section name.'); return; }
  const id = 'sec_'+Date.now();
  sections.push({id, name, type, entries:[]});
  save();
  document.getElementById('addSectionModal').classList.remove('open');
  document.getElementById('newSecName').value = '';
  activeSec = id;
  renderTabs();
  renderSection();
}

// ── RECORDS VIEW ──────────────────────────────────────────────────────────────
async function renderRecords() {
  document.getElementById('sectionContent').innerHTML = `
    <div class="records-view">
      <div class="records-header-card">
        <div class="records-title">📅 Past Records</div>
        <div class="records-sub">Tap any date to view that day's transactions (read-only)</div>
      </div>
      <div class="records-list" id="recordsList">
        <div class="records-loading">Loading past records...</div>
      </div>
    </div>`;

  const dates = await loadPastDates();
  const list  = document.getElementById('recordsList');
  if (!list) return;

  if (!dates.length) {
    list.innerHTML = `<div class="records-empty">
      <div class="records-empty-icon">📭</div>
      <div>No past records yet.</div>
      <div style="font-size:0.72rem;margin-top:6px;color:var(--muted)">Records from previous days will appear here automatically.</div>
    </div>`;
    return;
  }

  list.innerHTML = dates.map(d => {
    const paid   = (d.sections||[]).flatMap(s=>s.entries||[]).filter(e=>e.payment==='Paid');
    const total  = paid.reduce((s,e)=>s+e.total,0);
    const comm   = paid.reduce((s,e)=>s+(e.commission||0),0);
    const net    = total - comm;
    const secNames = (d.sections||[]).map(s=>s.name).join(', ');
    const label  = formatDateKey(d.dateKey);
    return `<div class="record-item" onclick="openPastDate('${d.dateKey}')">
      <div>
        <div class="record-date-label">${label}</div>
        <div class="record-date-sub">${secNames}</div>
      </div>
      <div class="record-meta">
        <div class="record-total">₱${net.toFixed(2)}</div>
        <div class="record-sections">${paid.length} paid entr${paid.length!==1?'ies':'y'}</div>
      </div>
      <div class="record-arrow">›</div>
    </div>`;
  }).join('');
}

function formatDateKey(key) {
  // "2025-04-15" → "Apr 15, 2025 — Tuesday"
  const d = new Date(key + 'T00:00:00');
  return d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric',year:'numeric'});
}

async function openPastDate(dateKey) {
  const remote = await loadFromFirestore(dateKey);
  if (!remote) {
    alert('Could not load this record.');
    return;
  }
  viewingPastDate = dateKey;
  pastDateData    = remote;
  renderPastDateView();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function calcSecStats(sec) {
  const paid = (sec.entries||[]).filter(e=>e.payment==='Paid');
  const totalGals  = paid.reduce((s,e)=>s+e.qty,0);
  const totalSales = paid.reduce((s,e)=>s+e.total,0);
  const totalComm  = sec.type==='delivery' ? paid.reduce((s,e)=>s+(e.commission||0),0) : 0;
  return { totalGals, totalSales, totalComm, overall:totalSales-totalComm, entryCount:(sec.entries||[]).length };
}

// ── PRICING ───────────────────────────────────────────────────────────────────
function catalog() { return getActive().type==='delivery' ? DELIVERY_PRICES : PICKUP_PRICES; }

function onCatChange(init) {
  const cat    = document.getElementById('category')?.value;
  const chips  = document.getElementById('priceChips');
  const priceIn= document.getElementById('price');
  if (!cat||!chips||!priceIn) return;
  const def = catalog()[cat];
  chips.innerHTML=''; priceIn.readOnly=false; priceIn.value='';
  if (!def){calcTotal();return;}
  if (def.type==='fixed') {
    buildChips(chips,[{label:'₱'+def.val,val:def.val}],priceIn);
    priceIn.value=def.val; priceIn.readOnly=true;
    chips.querySelector('.chip').classList.add('active');
  } else if (def.type==='range') {
    buildChips(chips,def.vals.map(p=>({label:'₱'+p,val:p})),priceIn);
    priceIn.value=def.vals[0]; chips.querySelector('.chip').classList.add('active');
  } else if (def.type==='options') {
    buildChips(chips,def.opts.map(o=>({label:o.label+' ₱'+o.val,val:o.val})),priceIn);
    priceIn.value=def.opts[0].val; chips.querySelector('.chip').classList.add('active');
  }
  calcTotal();
}

function buildChips(container, opts, input) {
  opts.forEach(o=>{
    const c=document.createElement('button');
    c.className='chip';c.type='button';c.dataset.val=o.val;c.textContent=o.label;
    c.onclick=()=>{ container.querySelectorAll('.chip').forEach(x=>x.classList.remove('active')); c.classList.add('active'); input.value=o.val; calcTotal(); };
    container.appendChild(c);
  });
}

function calcTotal() {
  const qty  = parseFloat(document.getElementById('qty')?.value)||0;
  const price= parseFloat(document.getElementById('price')?.value)||0;
  const el   = document.getElementById('totalPreview');
  if (el) el.textContent='₱ '+(qty*price).toFixed(2);
}

function setPay(val) {
  formPay[activeSec]=val;
  const bp=document.getElementById('btnPaid');
  const bu=document.getElementById('btnUnpaid');
  if (bp) bp.className='pay-btn'+(val==='Paid'?' paid-active':'');
  if (bu) bu.className='pay-btn'+(val==='No Payment'?' unpaid-active':'');
}

// ── ADD ENTRY ─────────────────────────────────────────────────────────────────
function addEntry() {
  const sec  = getActive();
  const name = document.getElementById('custName').value.trim();
  const qty  = parseFloat(document.getElementById('qty').value);
  const cat  = document.getElementById('category').value;
  const price= parseFloat(document.getElementById('price').value);
  if (!name)               {alert('Enter customer name.');return;}
  if (!qty||qty<1)         {alert('Enter valid quantity.');return;}
  if (isNaN(price)||price<0){alert('Enter valid price.');return;}
  const comm = sec.type==='delivery'?(DELIVERY_COMMISSION[cat]||0)*qty:0;
  sec.entries.push({id:Date.now(),name,qty,cat,price,total:qty*price,commission:comm,payment:formPay[sec.id]||'Paid'});
  save(); renderTable(); renderSummary(); resetForm();
}

function resetForm() {
  const n=document.getElementById('custName');
  const q=document.getElementById('qty');
  if(n)n.value=''; if(q)q.value='1';
  onCatChange(false); setPay('Paid');
}

// ── TABLE ─────────────────────────────────────────────────────────────────────
function renderTable() {
  const sec=getActive(); const isDel=sec.type==='delivery';
  const tbody=document.getElementById('entriesBody');
  if(!tbody)return;
  if(!sec.entries.length){
    tbody.innerHTML=`<tr class="empty-row"><td colspan="${isDel?9:8}">No entries yet</td></tr>`;return;
  }
  tbody.innerHTML=sec.entries.map((e,i)=>`
    <tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td>${esc(e.name)}</td><td>${CAT_LABELS[e.cat]||e.cat}</td><td>${e.qty}</td>
      <td>₱${e.price.toFixed(2)}</td>
      <td style="font-weight:600;color:var(--accent)">₱${e.total.toFixed(2)}</td>
      ${isDel?`<td style="color:var(--commission)">₱${(e.commission||0).toFixed(2)}</td>`:''}
      <td><span class="${e.payment==='Paid'?'badge-paid':'badge-unpaid'}">${e.payment}</span></td>
      <td><div class="action-btns">
        <button class="btn-edit" onclick="openEdit(${e.id})">Edit</button>
        <button class="btn-del"  onclick="deleteEntry(${e.id})">Del</button>
      </div></td>
    </tr>`).join('');
}

// ── SUMMARY ───────────────────────────────────────────────────────────────────
function renderSummary() {
  const sec=getActive(); const isDel=sec.type==='delivery';
  const cats=isDel?DELIVERY_CATS:PICKUP_CATS;
  const grid=document.getElementById('summaryGrid');
  if(!grid)return;
  let grandTotal=0,totalGals=0,totalSales=0,totalComm=0;
  const items=cats.map(cat=>{
    const rows=sec.entries.filter(e=>e.cat===cat);
    if(!rows.length)return'';
    const paidRows=rows.filter(e=>e.payment==='Paid');
    const qty=rows.reduce((s,e)=>s+e.qty,0);
    const amt=paidRows.reduce((s,e)=>s+e.total,0);
    const comm=paidRows.reduce((s,e)=>s+(e.commission||0),0);
    grandTotal+=amt; totalGals+=paidRows.reduce((s,e)=>s+e.qty,0); totalSales+=amt; totalComm+=comm;
    return `<div class="sum-item"><div class="sum-cat">${CAT_LABELS[cat]}</div><div class="sum-qty">${qty} unit${qty!==1?'s':''}</div><div class="sum-total">₱${amt.toFixed(2)}</div>${isDel?`<div class="sum-commission">Commission: ₱${comm.toFixed(2)}</div>`:''}</div>`;
  });
  const unpaid=sec.entries.filter(e=>e.payment==='No Payment');
  if(unpaid.length){
    const ua=unpaid.reduce((s,e)=>s+e.total,0);
    items.push(`<div class="sum-item" style="border-color:rgba(248,113,113,0.3)"><div class="sum-cat" style="color:var(--unpaid)">Unpaid</div><div class="sum-qty">${unpaid.length} entr${unpaid.length!==1?'ies':'y'}</div><div class="sum-total" style="color:var(--unpaid)">₱${ua.toFixed(2)}</div></div>`);
  }
  grid.innerHTML=items.join('');
  if(!isDel){
    const gt=document.getElementById('grandTotal');
    if(gt)gt.textContent='₱ '+grandTotal.toFixed(2);
  } else {
    const og=document.getElementById('overallGrid');
    if(og)og.innerHTML=`
      <div class="overall-item"><div class="o-label">Total Gallons</div><div class="o-val" style="color:var(--text)">${totalGals}</div></div>
      <div class="overall-item"><div class="o-label">Total Sales</div><div class="o-val" style="color:var(--accent)">₱${totalSales.toFixed(2)}</div></div>
      <div class="overall-item"><div class="o-label">Total Commission</div><div class="o-val" style="color:var(--commission)">₱${totalComm.toFixed(2)}</div></div>
      <div class="overall-item"><div class="o-label">Overall (Net)</div><div class="o-val" style="color:var(--accent2)">₱${(totalSales-totalComm).toFixed(2)}</div></div>`;
  }
}

// ── DELETE ────────────────────────────────────────────────────────────────────
function deleteEntry(id) {
  if(!confirm('Delete this entry?'))return;
  getActive().entries=getActive().entries.filter(e=>e.id!==id);
  save(); renderTable(); renderSummary();
}

// ── EDIT ──────────────────────────────────────────────────────────────────────
function openEdit(id) {
  const sec=getActive(); editId=id; editSecId=sec.id;
  const e=sec.entries.find(x=>x.id===id); if(!e)return;
  const isDel=sec.type==='delivery';
  const cats=isDel?DELIVERY_CATS:PICKUP_CATS;
  document.getElementById('eCat').innerHTML=cats.map(c=>`<option value="${c}"${c===e.cat?' selected':''}>${CAT_LABELS[c]}</option>`).join('');
  document.getElementById('eName').value=e.name;
  document.getElementById('eQty').value=e.qty;
  document.getElementById('ePrice').value=e.price;
  document.getElementById('ePayment').value=e.payment;
  onEditCatChange(e.price); calcEditTotal();
  document.getElementById('editModal').classList.add('open');
}

function onEditCatChange(currentPrice) {
  const cat=document.getElementById('eCat').value;
  const sec=getSec(editSecId)||getActive();
  const cat_db=sec.type==='delivery'?DELIVERY_PRICES:PICKUP_PRICES;
  const chips=document.getElementById('eChips');
  const priceIn=document.getElementById('ePrice');
  chips.innerHTML=''; priceIn.readOnly=false;
  const def=cat_db[cat]; if(!def){calcEditTotal();return;}
  if(def.type==='fixed'){buildChipsModal(chips,[{label:'₱'+def.val,val:def.val}],priceIn);priceIn.value=currentPrice??def.val;priceIn.readOnly=true;}
  else if(def.type==='range'){buildChipsModal(chips,def.vals.map(p=>({label:'₱'+p,val:p})),priceIn);if(currentPrice===undefined||currentPrice===null)priceIn.value=def.vals[0];}
  else if(def.type==='options'){buildChipsModal(chips,def.opts.map(o=>({label:o.label+' ₱'+o.val,val:o.val})),priceIn);if(currentPrice===undefined||currentPrice===null)priceIn.value=def.opts[0].val;}
  const av=parseFloat(priceIn.value);
  chips.querySelectorAll('.chip').forEach(c=>{if(parseFloat(c.dataset.val)===av)c.classList.add('active');});
  calcEditTotal();
}

function buildChipsModal(container,opts,input) {
  opts.forEach(o=>{
    const c=document.createElement('button');
    c.className='chip';c.type='button';c.dataset.val=o.val;c.textContent=o.label;
    c.onclick=()=>{container.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));c.classList.add('active');input.value=o.val;calcEditTotal();};
    container.appendChild(c);
  });
}

function calcEditTotal() {
  const qty=parseFloat(document.getElementById('eQty')?.value)||0;
  const price=parseFloat(document.getElementById('ePrice')?.value)||0;
  const el=document.getElementById('editTotalPreview');
  if(el)el.textContent='₱ '+(qty*price).toFixed(2);
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
  editId=null; editSecId=null;
}

function saveEdit() {
  const sec=getSec(editSecId);
  const idx=sec.entries.findIndex(e=>e.id===editId);
  const cat=document.getElementById('eCat').value;
  const qty=parseFloat(document.getElementById('eQty').value);
  const price=parseFloat(document.getElementById('ePrice').value);
  const comm=sec.type==='delivery'?(DELIVERY_COMMISSION[cat]||0)*qty:0;
  if(!document.getElementById('eName').value.trim()){alert('Name required.');return;}
  if(!qty||qty<1){alert('Invalid quantity.');return;}
  if(isNaN(price)){alert('Invalid price.');return;}
  sec.entries[idx]={id:editId,name:document.getElementById('eName').value.trim(),cat,qty,price,total:qty*price,commission:comm,payment:document.getElementById('ePayment').value};
  save(); renderTable(); renderSummary(); closeModal();
}

// ── EXPORT CSV ────────────────────────────────────────────────────────────────
function buildSectionRows(sec, dateStr) {
  const isDel=sec.type==='delivery';
  const hdr=['#','Name','Category','Qty','Price','Total'];
  if(isDel)hdr.push('Commission');
  hdr.push('Payment');
  const rows=[[`Section: ${sec.name} (${sec.type})`],hdr];
  sec.entries.forEach((e,i)=>{
    const r=[i+1,e.name,CAT_LABELS[e.cat]||e.cat,e.qty,e.price.toFixed(2),e.total.toFixed(2)];
    if(isDel)r.push((e.commission||0).toFixed(2));
    r.push(e.payment); rows.push(r);
  });
  return rows;
}

function exportCSV() {
  const sec=getActive();
  const dateStr=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const rows=buildSectionRows(sec,dateStr);
  rows.push([],[`--- SUMMARY ---`]);
  const cats=sec.type==='delivery'?DELIVERY_CATS:PICKUP_CATS;
  cats.forEach(cat=>{
    const r=sec.entries.filter(e=>e.cat===cat); if(!r.length)return;
    const qty=r.reduce((s,e)=>s+e.qty,0);
    const amt=r.filter(e=>e.payment==='Paid').reduce((s,e)=>s+e.total,0);
    rows.push([CAT_LABELS[cat],'',qty+' units','','',amt.toFixed(2),'(paid)']);
  });
  if(sec.type==='delivery'){
    const paid=sec.entries.filter(e=>e.payment==='Paid');
    rows.push([],[`Total Sales: ₱${paid.reduce((s,e)=>s+e.total,0).toFixed(2)}`]);
    rows.push([`Commission: ₱${paid.reduce((s,e)=>s+(e.commission||0),0).toFixed(2)}`]);
    rows.push([`Overall: ₱${(paid.reduce((s,e)=>s+e.total,0)-paid.reduce((s,e)=>s+(e.commission||0),0)).toFixed(2)}`]);
  } else {
    rows.push([`GRAND TOTAL: ₱${sec.entries.filter(e=>e.payment==='Paid').reduce((s,e)=>s+e.total,0).toFixed(2)}`]);
  }
  downloadCSV(rows,`${sec.name.replace(/\s+/g,'_')}_${dateStr.replace(/[,\s]+/g,'_')}.csv`);
}

function exportDashboardCSV() {
  const dateStr=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const rows=[[`CASHIER LOG — FULL SUMMARY — ${dateStr}`],[]];
  rows.push(['Section','Type','Gallons','Total Sales','Commission','Overall']);
  let gG=0,gS=0,gC=0;
  sections.forEach(sec=>{
    const s=calcSecStats(sec); gG+=s.totalGals; gS+=s.totalSales; gC+=s.totalComm;
    rows.push([sec.name,sec.type,s.totalGals,s.totalSales.toFixed(2),s.totalComm.toFixed(2),s.overall.toFixed(2)]);
  });
  rows.push([],[`GRAND TOTAL`,'',gG,gS.toFixed(2),gC.toFixed(2),(gS-gC).toFixed(2)]);
  rows.push([]);
  sections.forEach(sec=>{ rows.push(...buildSectionRows(sec,dateStr)); rows.push([]); });
  downloadCSV(rows,`Summary_${dateStr.replace(/[,\s]+/g,'_')}.csv`);
}

function exportPastDateCSV(dateKey) {
  const secs=pastDateData||[];
  const label=formatDateKey(dateKey);
  const rows=[[`CASHIER LOG — ${label}`],[]];
  secs.forEach(sec=>{ rows.push(...buildSectionRows(sec,label)); rows.push([]); });
  downloadCSV(rows,`Record_${dateKey}.csv`);
}

function downloadCSV(rows,filename) {
  const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},300);
}

// ── CLEAR ─────────────────────────────────────────────────────────────────────
function clearSection() {
  if(activeSec===DASHBOARD_ID||activeSec===RECORDS_ID)return;
  if(!confirm(`Clear ALL entries in "${getActive().name}"?`))return;
  getActive().entries=[]; save(); renderTable(); renderSummary();
}

// ── UTIL ──────────────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Expose functions to global scope (needed since we're in a module)
window.calcTotal=calcTotal; window.onCatChange=onCatChange; window.setPay=setPay;
window.addEntry=addEntry; window.deleteEntry=deleteEntry; window.openEdit=openEdit;
window.onEditCatChange=onEditCatChange; window.calcEditTotal=calcEditTotal;
window.closeModal=closeModal; window.saveEdit=saveEdit;
window.exportCSV=exportCSV; window.exportDashboardCSV=exportDashboardCSV;
window.exportPastDateCSV=exportPastDateCSV; window.clearSection=clearSection;
window.confirmAddSection=confirmAddSection; window.switchSection=switchSection;
window.openPastDate=openPastDate;

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
